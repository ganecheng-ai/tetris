name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name Tetris --icon=NONE tetris.py

      - name: Rename and package
        run: |
          mv dist/Tetris.exe dist/Tetris-Windows-x64.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-windows-x64
          path: dist/Tetris-Windows-x64.exe

      - name: Create temporary release folder
        run: mkdir release
        shell: bash

      - name: Copy binary to release folder
        run: copy dist\Tetris-Windows-x64.exe release\
        shell: cmd

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name Tetris tetris.py

      - name: Rename and package
        run: |
          mv dist/Tetris dist/Tetris-macOS-x64
          chmod +x dist/Tetris-macOS-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-macos-x64
          path: dist/Tetris-macOS-x64

      - name: Create temporary release folder
        run: mkdir release

      - name: Copy binary to release folder
        run: cp dist/Tetris-macOS-x64 release/

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name Tetris tetris.py

      - name: Create tar.gz archive
        run: |
          mv dist/Tetris dist/Tetris-Linux-x64
          chmod +x dist/Tetris-Linux-x64
          tar -czvf dist/Tetris-Linux-x64.tar.gz -C dist Tetris-Linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-linux-x64
          path: dist/Tetris-Linux-x64.tar.gz

      - name: Create temporary release folder
        run: mkdir release

      - name: Copy archive to release folder
        run: cp dist/Tetris-Linux-x64.tar.gz release/

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: tetris-windows-x64
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: tetris-macos-x64
          path: release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: tetris-linux-x64
          path: release

      - name: Generate checksums
        run: |
          cd release
          sha256sum Tetris-Windows-x64.exe > checksums.txt
          sha256sum Tetris-macOS-x64 >> checksums.txt
          sha256sum Tetris-Linux-x64.tar.gz >> checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/Tetris-Windows-x64.exe
            release/Tetris-macOS-x64
            release/Tetris-Linux-x64.tar.gz
            release/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
